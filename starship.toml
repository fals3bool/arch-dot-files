format = """
$cmd_duration\
[ŅéČ](#1A1A1D)\
$os\
[Ņé▒](bg:#1A1A1D fg:#282828)\
$username\
[Ņé▒](bg:#1A1A1D fg:#282828)\
$directory\
[Ņé░](fg:#1A1A1D)\
${custom.directory_separator_not_git}\
${custom.directory_separator_git}\
$symbol($git_branch)\
$symbol( $git_commit$git_status$git_metrics$git_state)\
$line_break\
$character
"""

command_timeout = 120

[fill]
symbol = " "

# Set to true to avoid a two-line prompt
[line_break]
disabled = false

# Set disabled to true when using a one-line prompt for more aesthetically pleasing results
[character]
success_symbol = '[’üö](bold bright-green)'
error_symbol = '[’æ¦](bold red)'
format = '$symbol '
disabled = false

# Disable the blank line at the start of the prompt
#add_newline = false

# You can also replace your username with a neat symbol like ’äĀ or disable this
# and use the os module below
[username]
show_always = true
style_user = 'bg:#1A1A1D'
style_root = 'bg:#1A1A1D'
format = '[ $user ](bold $style)'
disabled = false

[hostname]
ssh_only = true
trim_at = '.'
style = 'bg:#1A1A1D'
format = '[@$hostname ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = 'bold bg:#1A1A1D fg:bright-green'
disabled = false # disabled by default

[os.symbols]
Debian = "¾░Żć "
Arch = "ŌÖź "

[directory]
style = 'bold bg:#1A1A1D'
format = '[ $path ]($style)'
truncation_length = 3
truncation_symbol = 'ŌĆ”/'

[git_branch]
symbol = '’Éś'
style = 'bold'
format = '[ $symbol $branch ]($style)'

[git_metrics]
disabled = false

[package]
disabled = true # Enable to output the current working directory's package version
format = "[$symbol$version]($style) "
display_private = true

# Output the command duration if grather than min_time (seconds)
[cmd_duration]
min_time = 1_000
format = "[ ’ĆŚ  $duration \n\n]($style)"
style = "yellow"


